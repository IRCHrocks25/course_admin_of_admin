<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:40px 20px;">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;max-width:600px;">
                    <!-- Header -->
                    <tr>
                        <td style="background:linear-gradient(135deg,#00f0ff,#a855f7);padding:24px 32px;">
                            <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:700;">{{ notification.title }}</h1>
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td style="padding:32px;">
                            {% if user %}
                            <p style="margin:0 0 16px;color:#374151;font-size:15px;">Hi {{ user.first_name|default:user.username }},</p>
                            {% endif %}
                            <div style="color:#374151;font-size:15px;line-height:1.6;">
                                {{ notification.body|safe }}
                            </div>
                            {% if cta_url and notification.cta_label %}
                            <table role="presentation" cellpadding="0" cellspacing="0" style="margin:28px 0 0;">
                                <tr>
                                    <td style="border-radius:8px;background:linear-gradient(135deg,#00f0ff,#a855f7);">
                                        <a href="{{ cta_url }}" target="_blank" style="display:inline-block;padding:12px 28px;color:#0a0e27;font-size:15px;font-weight:700;text-decoration:none;">{{ notification.cta_label }}</a>
                                    </td>
                                </tr>
                            </table>
                            {% endif %}
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="padding:20px 32px;border-top:1px solid #e5e7eb;">
                            <p style="margin:0;color:#9ca3af;font-size:12px;">
                                Sent from {{ tenant.name|default:"CourseForge" }} platform.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
