{% extends 'dashboard/base.html' %}

{% block title %}New Event{% endblock %}
{% block page_title %}New Event{% endblock %}

{% block content %}
<style>
  /* Field styles (.ef-section/.ef-input/.ef-label/…) live in _event_form_fields.html. */
  .ef-form { max-width: 760px; }
  .ef-actions { display: flex; gap: 12px; margin-top: 2rem; }
  .ef-btn { display: inline-flex; align-items: center; gap: 7px; padding: 11px 20px; border-radius: 9px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; }
  .ef-btn-primary { background: linear-gradient(135deg, #1e3a8a, #6366f1); color: #fff; }
  .ef-btn-ghost { background: transparent; border: 1px solid var(--brand-border); color: var(--brand-text-primary); }
</style>

<form class="ef-form" method="post" action="{% url 'dashboard_add_event' %}" enctype="multipart/form-data">
  {% csrf_token %}
  {% include 'dashboard/_event_form_fields.html' %}
  <div class="ef-actions">
    <button type="submit" class="ef-btn ef-btn-primary"><i class="fas fa-check"></i> Create Event</button>
    <a href="{% url 'dashboard_events' %}" class="ef-btn ef-btn-ghost">Cancel</a>
  </div>
</form>
{% endblock %}
