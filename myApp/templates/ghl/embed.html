<!doctype html><html><head><meta charset="utf-8">
<title>CourseForge</title><meta name="robots" content="noindex,nofollow">
<style>html,body{height:100%;margin:0}body{font-family:system-ui;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#333;text-align:center;padding:2rem}.muted{color:#999;font-size:13px;margin-top:1rem;max-width:34rem;word-break:break-word}</style></head>
<body>
<h2 id="h">Loading your academy…</h2>
<p class="muted" id="m">Connecting to GoHighLevel…</p>
<script>
(function(){
  var settled=false;
  var seen=[];
  function setStatus(h,m){ if(h!=null)document.getElementById('h').textContent=h; if(m!=null)document.getElementById('m').textContent=m; }
  function showError(reason){ settled=true; setStatus('Open from a sub-account', reason||'This page must be opened from inside a GoHighLevel sub-account.'); }
  function resolve(payload){
    if(settled)return; settled=true;
    setStatus('Loading your academy…','Signing you in…');
    fetch('/leadconnector/embed/resolve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({payload:payload})})
      .then(function(r){return r.json();})
      .then(function(j){ if(j&&j.ok&&j.redirect){ setStatus('Loading your academy…','Opening your academy…'); window.location.href=j.redirect; } else { showError(j&&j.reason); } })
      .catch(function(){ showError('could not reach CourseForge'); });
  }
  // Fallback: some setups append the blob as a query param.
  var q=new URLSearchParams(window.location.search);
  var qp=q.get('encryptedUserData')||q.get('userData');
  if(qp){ resolve(qp); return; }
  // Primary: GHL posts the encrypted context to the iframe when asked.
  function onMsg(e){
    if(settled)return;
    var d=e&&e.data;
    if(d&&d.message){ if(seen.indexOf(d.message)<0) seen.push(d.message); }
    if(d&&d.message==='REQUEST_USER_DATA_RESPONSE'&&typeof d.payload==='string'){
      window.removeEventListener('message',onMsg); resolve(d.payload);
    }
  }
  window.addEventListener('message',onMsg);
  // Ask repeatedly — the parent may not be listening the instant we load.
  function ask(){ if(!settled&&window.parent){ try{ window.parent.postMessage({message:'REQUEST_USER_DATA'},'*'); }catch(e){} } }
  ask(); [250,600,1200,2500,4000].forEach(function(ms){ setTimeout(ask,ms); });
  setTimeout(function(){
    if(!settled){
      showError('No sub-account context from GoHighLevel. Open this from inside a sub-account. (messages seen: ['+seen.join(', ')+'])');
    }
  },7000);
})();
</script>
</body></html>
