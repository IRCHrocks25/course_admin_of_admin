<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ tenant.name }} - Learning Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#0a0e27] via-[#1a1f3a] to-black text-white">
    <main class="max-w-5xl mx-auto px-6 py-16">
        <div class="rounded-2xl border border-white/10 bg-white/5 p-8">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div>
                    <p class="text-sm text-cyan-300 uppercase tracking-widest">Tenant Portal</p>
                    <h1 class="text-4xl font-black mt-2">{{ tenant.name }}</h1>
                    <p class="text-gray-300 mt-2">
                        Welcome to your learning hub. Browse courses, continue lessons, and track progress.
                    </p>
                </div>
                <div class="w-14 h-14 rounded-full border border-white/20" style="background-color: {{ tenant.primary_color }};"></div>
            </div>

            <div class="grid sm:grid-cols-3 gap-4 mt-8">
                <div class="rounded-lg border border-white/10 bg-[#0a0e27] p-4">
                    <div class="text-sm text-gray-400">Active Courses</div>
                    <div class="text-3xl font-bold">{{ course_count }}</div>
                </div>
                <div class="rounded-lg border border-white/10 bg-[#0a0e27] p-4 sm:col-span-2">
                    <div class="text-sm text-gray-400">Quick Actions</div>
                    <div class="mt-3 flex flex-wrap gap-2">
                        <a href="{% url 'courses' %}" class="px-4 py-2 rounded-lg bg-cyan-500/20 border border-cyan-300/40 text-cyan-200 hover:bg-cyan-500/30 transition">View Courses</a>
                        {% if user.is_authenticated %}
                        <a href="{% url 'logout' %}" class="px-4 py-2 rounded-lg border border-white/30 hover:bg-white/10 transition">Log Out</a>
                        {% else %}
                        <a href="{% url 'login' %}" class="px-4 py-2 rounded-lg border border-white/30 hover:bg-white/10 transition">Sign In</a>
                        <a href="{% url 'register' %}" class="px-4 py-2 rounded-lg border border-white/30 hover:bg-white/10 transition">Register</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
