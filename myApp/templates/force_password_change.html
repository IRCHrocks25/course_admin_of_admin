{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Inter, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 55%, #000 100%);
        }
    </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center p-6">
    <div class="w-full max-w-md rounded-2xl border border-cyan-400/25 bg-[#0a0e27]/80 backdrop-blur-md p-6 sm:p-8">
        <h1 class="text-2xl font-bold mb-2">Change your password</h1>
        <p class="text-sm text-gray-300 mb-6">
            For security, you need to set a new password before continuing.
        </p>

        {% if messages %}
        <div class="space-y-2 mb-4">
            {% for message in messages %}
            <div class="rounded-lg border border-white/15 bg-white/5 px-3 py-2 text-sm">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="new_password" class="block text-sm text-gray-300 mb-1">New password</label>
                <input
                    id="new_password"
                    name="new_password"
                    type="password"
                    required
                    autocomplete="new-password"
                    class="w-full rounded-lg bg-[#0a0e27] border border-white/20 px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-cyan-300/60"
                >
            </div>
            <div>
                <label for="confirm_password" class="block text-sm text-gray-300 mb-1">Confirm new password</label>
                <input
                    id="confirm_password"
                    name="confirm_password"
                    type="password"
                    required
                    autocomplete="new-password"
                    class="w-full rounded-lg bg-[#0a0e27] border border-white/20 px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-cyan-300/60"
                >
            </div>
            <button
                type="submit"
                class="w-full rounded-lg bg-cyan-400 text-[#0a0e27] font-semibold px-4 py-2.5 hover:bg-cyan-300 transition"
            >
                Save new password
            </button>
        </form>
    </div>
</body>
</html>
