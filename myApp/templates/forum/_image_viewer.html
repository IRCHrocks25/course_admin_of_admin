<style>
    .forum-image-viewer {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: none;
        background: #000;
    }
    .forum-image-viewer.open { display: flex; }
    .forum-image-viewer-layout {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
    }
    @media (min-width: 1024px) {
        .forum-image-viewer-layout { flex-direction: row; }
    }
    .forum-image-viewer-stage {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: #000;
        position: relative;
    }
    .forum-image-viewer-stage img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        user-select: none;
    }
    .forum-image-viewer-stage-close {
        position: absolute;
        top: 12px;
        left: 12px;
        width: 40px;
        height: 40px;
        border-radius: 9999px;
        background: rgba(255,255,255,0.12);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 0;
        cursor: pointer;
        transition: background 0.15s;
    }
    .forum-image-viewer-stage-close:hover { background: rgba(255,255,255,0.22); }
    @media (min-width: 1024px) {
        .forum-image-viewer-stage-close { display: none; }
    }
    .forum-image-viewer-sidebar {
        width: 100%;
        max-height: 45vh;
        background: #fff;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-top: 1px solid rgba(0,0,0,0.08);
    }
    @media (min-width: 1024px) {
        .forum-image-viewer-sidebar {
            width: 400px;
            max-width: 400px;
            max-height: none;
            border-top: 0;
            border-left: 1px solid rgba(0,0,0,0.08);
            flex-shrink: 0;
        }
    }
    .forum-image-viewer-sidebar-top {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 12px 16px;
        border-bottom: 1px solid #e8e8e8;
        flex-shrink: 0;
    }
    .forum-image-viewer-sidebar-top button {
        font-size: 14px;
        font-weight: 600;
        color: #666;
        background: none;
        border: 0;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
    }
    .forum-image-viewer-sidebar-top button:hover { background: #f3f2ef; color: #191919; }
    @media (max-width: 1023px) {
        .forum-image-viewer-sidebar-top { display: none; }
    }
    .forum-image-viewer-sidebar-inner {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
    }
    .forum-image-viewer-sidebar-inner .forum-post-view-header { margin-bottom: 12px; }
    .forum-image-viewer-sidebar-inner .forum-post-view-body {
        font-size: 14px;
        line-height: 1.55;
        color: #191919;
        margin-bottom: 12px;
    }
    .forum-image-viewer-sidebar-inner .forum-post-view-reactions {
        padding-top: 8px;
        margin-bottom: 12px;
        border-top: 1px solid #e8e8e8;
    }
    .forum-image-viewer-sidebar-inner .forum-post-view-comments {
        border-top: 1px solid #e8e8e8;
        padding-top: 12px;
        margin-top: 4px;
    }
    .forum-image-viewer-sidebar-inner .forum-post-view-comments.hidden { display: block !important; }
    .forum-post-image-viewable {
        cursor: zoom-in;
        transition: opacity 0.15s;
    }
    .forum-post-image-viewable:hover { opacity: 0.92; }
</style>

<div id="forum-image-viewer" class="forum-image-viewer" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Post image">
    <div class="forum-image-viewer-layout">
        <div class="forum-image-viewer-stage">
            <button type="button" class="forum-image-viewer-stage-close" onclick="closeForumImageViewer()" aria-label="Close">
                <i class="fas fa-times"></i>
            </button>
            <img id="forum-image-viewer-img" src="" alt="Post image">
        </div>
        <aside class="forum-image-viewer-sidebar">
            <div class="forum-image-viewer-sidebar-top">
                <button type="button" onclick="closeForumImageViewer()">Close post</button>
            </div>
            <div id="forum-image-viewer-sidebar-inner" class="forum-image-viewer-sidebar-inner"></div>
        </aside>
    </div>
</div>

<script>
window.forumPostDetailUrl = function(postId) {
    return '{% url "forum_post_detail" post_id=0 %}'.replace('/0/', '/' + postId + '/');
};
</script>

<script>
function openForumImageViewer(postId) {
    var root = document.getElementById('post-' + postId);
    if (!root) return;
    var img = root.querySelector('[data-forum-image-view]');
    if (!img) return;

    var viewer = document.getElementById('forum-image-viewer');
    var viewerImg = document.getElementById('forum-image-viewer-img');
    var sidebar = document.getElementById('forum-image-viewer-sidebar-inner');
    if (!viewer || !viewerImg || !sidebar) return;

    viewerImg.src = img.currentSrc || img.src;
    viewerImg.alt = img.alt || 'Post image';

    sidebar.innerHTML = '';

    var header = root.querySelector('.forum-post-view-header');
    if (header) sidebar.appendChild(header.cloneNode(true));

    var body = root.querySelector('.forum-post-view-body');
    if (body) sidebar.appendChild(body.cloneNode(true));

    var reactions = root.querySelector('.forum-post-view-reactions');
    if (reactions) sidebar.appendChild(reactions.cloneNode(true));

    var comments = root.querySelector('.forum-post-view-comments')
        || document.getElementById('post-comments-' + postId);
    if (comments) {
        var commentsClone = comments.cloneNode(true);
        commentsClone.classList.remove('hidden');
        commentsClone.id = 'viewer-comments-' + postId;
        sidebar.appendChild(commentsClone);
    } else {
        var empty = document.createElement('p');
        empty.className = 'text-xs forum-text-muted mt-2';
        empty.textContent = 'No comments yet. Be the first to comment.';
        sidebar.appendChild(empty);
        var link = document.createElement('a');
        link.href = (window.forumPostDetailUrl && window.forumPostDetailUrl(postId)) || ('/community/post/' + postId + '/');
        link.className = 'inline-block mt-2 text-xs font-semibold text-[#0a66c2] hover:underline';
        link.textContent = 'View all comments';
        sidebar.appendChild(link);
    }

    viewer.classList.add('open');
    viewer.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
}

function closeForumImageViewer() {
    var viewer = document.getElementById('forum-image-viewer');
    if (!viewer) return;
    viewer.classList.remove('open');
    viewer.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    var viewerImg = document.getElementById('forum-image-viewer-img');
    if (viewerImg) viewerImg.src = '';
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        var viewer = document.getElementById('forum-image-viewer');
        if (viewer && viewer.classList.contains('open')) closeForumImageViewer();
    }
});

document.addEventListener('click', function(e) {
    var img = e.target.closest('[data-forum-image-view]');
    if (!img) return;
    var postRoot = img.closest('[id^="post-"]');
    if (!postRoot) return;
    var postId = postRoot.id.replace('post-', '');
    if (postId) openForumImageViewer(postId);
});

document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    var img = e.target.closest('[data-forum-image-view]');
    if (!img) return;
    e.preventDefault();
    var postRoot = img.closest('[id^="post-"]');
    if (!postRoot) return;
    var postId = postRoot.id.replace('post-', '');
    if (postId) openForumImageViewer(postId);
});
</script>
